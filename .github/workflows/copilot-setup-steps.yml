name: "Copilot Setup Steps"

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    environment: copilot
    permissions: {}
    env:
      VERCEL_AI_API_KEY: ${{ secrets.VERCEL_AI_API_KEY }}

    steps:
      - name: vercel-ai
        if: ${{ env.VERCEL_AI_API_KEY != '' }}
        # Pinned to a full-length commit SHA for supply-chain security.
        uses: vercel/ai-action@bd265252c9d1d8295ceda28dadb56ad9321c8ccc
        with:
          prompt: ${{ vars.VERCEL_AI_PROMPT }}
          api-key: ${{ secrets.VERCEL_AI_API_KEY }}
          model: ${{ vars.VERCEL_AI_MODEL }}
